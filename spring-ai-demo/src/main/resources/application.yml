# ══════════════════════════════════════════════════════════════════════
# CONFIGURATION SPRING AI
#
# Toute l'intégration LLM se pilote ici. Le code Java ne contient ni URL,
# ni clé, ni nom de modèle : changer de fournisseur = changer ce fichier.
# ══════════════════════════════════════════════════════════════════════
spring:
  application:
    name: spring-ai-demo

  ai:
    # ────────────────────────────────────────────────────────────────────
    # SÉLECTEUR DE FOURNISSEUR
    # Les deux starters (OpenAI + Ollama) sont dans le pom. Cette propriété
    # indique lequel activer : un seul bean ChatModel sera créé.
    #   openai → API OpenAI (clé requise)
    #   ollama → modèle local via Ollama (aucune clé)
    # ────────────────────────────────────────────────────────────────────
    model:
      chat: ollama
      # Même sélecteur pour le modèle d'EMBEDDINGS (utilisé par le RAG).
      # Sans cette ligne, les deux starters tenteraient chacun de créer
      # un bean EmbeddingModel → conflit au démarrage.
      embedding: ollama

    openai:
      # JAMAIS de clé en dur dans un fichier versionné.
      # ${OPENAI_API_KEY} lit la variable d'environnement au démarrage.
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          # Modèle économique et largement suffisant pour ce projet
          model: gpt-4o-mini
          # Température : 0 = déterministe, 1 = créatif.
          # 0.7 pour le chat ; pour de l'extraction structurée pure,
          # tu pourrais descendre vers 0.2.
          temperature: 0.7

    ollama:
      # URL par défaut du serveur Ollama local
      base-url: http://localhost:11434
      chat:
        options:
          # Modèle léger qui tourne sur un laptop (~2 Go).
          # Télécharge-le d'abord : ollama pull llama3.2
          model: llama3.2
      embedding:
        options:
          # Modèle d'EMBEDDINGS pour le RAG : transforme un texte en
          # vecteur de nombres. Ce n'est PAS un modèle de chat — il est
          # petit (~270 Mo) et spécialisé dans la similarité sémantique.
          # Télécharge-le d'abord : ollama pull nomic-embed-text
          model: nomic-embed-text

# ──────────────────────────────────────────────────────────────────────
# OBSERVABILITÉ PÉDAGOGIQUE
# Décommente pour voir les prompts réellement envoyés au LLM — notamment
# le schéma JSON que Spring AI injecte pour la sortie structurée.
# C'est le meilleur moyen de comprendre ce que le framework fait pour toi.
# ──────────────────────────────────────────────────────────────────────
logging:
  level:
    org.springframework.ai: DEBUG

# ══════════════════════════════════════════════════════════════════════
# PROFIL PAR DÉFAUT (tout SAUF "pgvector")
# Le RAG utilise le SimpleVectorStore en mémoire (RagConfig). Aucune base
# de données. Or les dépendances pgvector tirent HikariCP sur le
# classpath, ce qui fait que Spring Boot tente d'auto-configurer une
# DataSource au démarrage... et échoue, faute d'URL JDBC.
# On désactive donc cette auto-configuration tant que le profil pgvector
# n'est pas actif : le projet démarre exactement comme avant.
# ══════════════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: "!pgvector"
  autoconfigure:
    exclude:
      # Sans URL JDBC, l'auto-config DataSource échoue au démarrage.
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      # Elle déclare aussi un bean nommé "vectorStore" : sans l'exclure,
      # il entre en collision avec le SimpleVectorStore de RagConfig.
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

# ══════════════════════════════════════════════════════════════════════
# PROFIL "pgvector" — RAG sur la base PostgreSQL alimentée par ragbatch
# Activer avec :
#   mvn spring-boot:run -Dspring-boot.run.profiles=pgvector
# Prérequis : la base ragbatch tourne (cd ragbatch && docker compose up -d)
# et a été alimentée (mvn spring-boot:run dans ragbatch).
#
# Le profil ne fait que de la CONFIGURATION : aucune classe Java
# spécifique. Spring AI auto-configure un PgVectorStore à partir des
# propriétés ci-dessous, et RagController le reçoit via VectorStore.
# ══════════════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: pgvector

  # Mêmes identifiants que ragbatch/compose.yaml : les deux projets
  # parlent à la MÊME base. ragbatch écrit, spring-ai-demo lit.
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: rag
    password: ragpwd

  ai:
    vectorstore:
      pgvector:
        # false : c'est ragbatch qui POSSÈDE le schéma (table vector_store,
        # extension vector, index). L'application se contente de lire une
        # table déjà créée — elle ne doit pas tenter de la recréer.
        initialize-schema: false
        # DOIVENT correspondre à ce qu'a écrit ragbatch, sinon la
        # recherche est incohérente (768 = nomic-embed-text, cosinus).
        dimensions: 768
        distance-type: COSINE_DISTANCE
